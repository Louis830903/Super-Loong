<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息收集表单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 40px 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #7f8c8d;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 15px;
        }
        .required::after {
            content: " *";
            color: #e74c3c;
        }
        input[type="text"],
        input[type="tel"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background-color: #f9f9f9;
            color: #333;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .radio-option {
            display: flex;
            align-items: center;
        }
        .radio-option input {
            margin-right: 8px;
            transform: scale(1.2);
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #3498db, #2ecc71);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 15px rgba(0, 0, 0, 0.15);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #95a5a6;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>信息收集表单</h1>
            <p>请填写以下信息，我们将尽快与您联系</p>
        </div>
        <form id="infoForm">
            <div class="form-group">
                <label for="name" class="required">姓名</label>
                <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
                <label for="phone" class="required">电话</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入您的手机号码" required>
            </div>
            <div class="form-group">
                <label for="email" class="required">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入您的邮箱地址" required>
            </div>
            <div class="form-group">
                <label for="address" class="required">地址</label>
                <input type="text" id="address" name="address" placeholder="请输入您的详细地址" required>
            </div>
            <div class="form-group">
                <label for="question" class="required">咨询问题</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="question1" name="question" value="产品咨询" required>
                        <label for="question1">产品咨询</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="question2" name="question" value="技术支持">
                        <label for="question2">技术支持</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="question3" name="question" value="售后服务">
                        <label for="question3">售后服务</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="question4" name="question" value="其他">
                        <label for="question4">其他</label>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label for="details">详细说明</label>
                <textarea id="details" name="details" placeholder="请详细描述您的问题或需求..."></textarea>
            </div>
            <button type="submit" class="submit-btn">提交信息</button>
        </form>
        <div class="footer">
            <p>我们承诺保护您的隐私，信息仅用于联系您</p>
        </div>
    </div>
    <script>
        document.getElementById('infoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 简单的表单验证
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const question = document.querySelector('input[name="question"]:checked');
            
            if (!name || !phone || !email || !address || !question) {
                alert('请填写所有必填字段！');
                return;
            }
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入有效的手机号码！');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert('请输入有效的邮箱地址！');
                return;
            }
            
            // 收集表单数据
            const formData = {
                name: name,
                phone: phone,
                email: email,
                address: address,
                question: question.value,
                details: document.getElementById('details').value.trim()
            };
            
            // 在实际应用中，这里应该发送数据到服务器
            // 这里仅作演示
            alert('表单提交成功！\n\n' + 
                  '姓名：' + formData.name + '\n' +
                  '电话：' + formData.phone + '\n' +
                  '邮箱：' + formData.email + '\n' +
                  '地址：' + formData.address + '\n' +
                  '咨询问题：' + formData.question + '\n' +
                  '详细说明：' + (formData.details || '无'));
            
            // 重置表单
            this.reset();
        });
    </script>
</body>
</html>
