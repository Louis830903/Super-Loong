<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>在线咨询预约</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #bbb;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-message .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .success-message .icon::after {
            content: '✓';
            color: #fff;
            font-size: 40px;
            font-weight: bold;
        }

        .success-message h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #888;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="formSection">
            <div class="header">
                <h1>📋 在线咨询预约</h1>
                <p>请填写以下信息，我们会尽快与您联系</p>
            </div>

            <form id="consultForm">
                <div class="form-group">
                    <label>姓名<span class="required">*</span></label>
                    <input type="text" name="name" placeholder="请输入您的姓名" required>
                </div>

                <div class="form-group">
                    <label>电话<span class="required">*</span></label>
                    <input type="tel" name="phone" placeholder="请输入您的手机号" maxlength="11" required>
                </div>

                <div class="form-group">
                    <label>预约时间<span class="required">*</span></label>
                    <input type="datetime-local" name="time" required>
                </div>

                <div class="form-group">
                    <label>咨询问题<span class="required">*</span></label>
                    <textarea name="question" placeholder="请详细描述您想咨询的问题..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">提交预约</button>
            </form>

            <div class="footer">
                <p>您的信息将严格保密，仅用于咨询联系</p>
            </div>
        </div>

        <div id="successSection" class="success-message">
            <div class="icon"></div>
            <h2>提交成功！</h2>
            <p>我们已收到您的预约信息<br>工作人员会尽快与您联系</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('consultForm');
        const submitBtn = document.getElementById('submitBtn');
        const formSection = document.getElementById('formSection');
        const successSection = document.getElementById('successSection');

        // 设置时间选择器的最小值为当前时间
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.querySelector('input[name="time"]').min = now.toISOString().slice(0, 16);

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // 手机号验证
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(data.phone)) {
                alert('请输入正确的手机号码');
                return;
            }

            // 设置按钮加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>提交中...';

            try {
                // 模拟提交请求（实际使用时替换为真实API）
                await simulateSubmit(data);
                
                // 显示成功页面
                formSection.style.display = 'none';
                successSection.style.display = 'block';
            } catch (error) {
                alert('提交失败，请稍后重试');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '提交预约';
            }
        });

        // 模拟提交函数
        function simulateSubmit(data) {
            return new Promise((resolve) => {
                console.log('提交的数据：', data);
                setTimeout(resolve, 1500);
            });
        }

        // 手机号输入限制
        document.querySelector('input[name="phone"]').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
