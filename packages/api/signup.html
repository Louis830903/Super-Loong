<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活动报名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            color: #888;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group label::after {
            content: '*';
            color: #e74c3c;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
        }

        .input-wrapper input::placeholder {
            color: #bbb;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #999;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 15px;
            display: none;
            z-index: 1000;
        }

        .success-icon {
            text-align: center;
            margin-bottom: 20px;
        }

        .success-icon span {
            font-size: 60px;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 活动报名</h1>
            <p>填写信息，立即报名参加</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>姓名</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="请输入您的姓名"
                        maxlength="20"
                        autocomplete="off"
                    >
                </div>
                <div class="error-msg" id="nameError">请输入姓名</div>
            </div>

            <div class="form-group">
                <label>手机号码</label>
                <div class="input-wrapper">
                    <span class="input-icon">📱</span>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="请输入11位手机号"
                        maxlength="11"
                        inputmode="numeric"
                    >
                </div>
                <div class="error-msg" id="phoneError">请输入正确的手机号码</div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">立即报名</button>
        </form>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const form = document.getElementById('signupForm');
        const nameInput = document.getElementById('name');
        const phoneInput = document.getElementById('phone');
        const nameError = document.getElementById('nameError');
        const phoneError = document.getElementById('phoneError');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        // 手机号只能输入数字
        phoneInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        // 显示提示
        function showToast(message) {
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // 验证手机号
        function isValidPhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        // 表单提交
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            let isValid = true;

            // 验证姓名
            if (!nameInput.value.trim()) {
                nameError.style.display = 'block';
                nameInput.style.borderColor = '#e74c3c';
                isValid = false;
            } else {
                nameError.style.display = 'none';
                nameInput.style.borderColor = '#e0e0e0';
            }

            // 验证手机号
            if (!isValidPhone(phoneInput.value)) {
                phoneError.style.display = 'block';
                phoneInput.style.borderColor = '#e74c3c';
                isValid = false;
            } else {
                phoneError.style.display = 'none';
                phoneInput.style.borderColor = '#e0e0e0';
            }

            if (isValid) {
                submitBtn.disabled = true;
                submitBtn.textContent = '提交中...';

                // 模拟提交
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '立即报名';
                    
                    showToast('报名成功！');
                    form.reset();

                    // 这里可以添加实际的提交逻辑
                    // 例如：发送数据到服务器
                    const formData = {
                        name: nameInput.value,
                        phone: phoneInput.value,
                        timestamp: new Date().toISOString()
                    };
                    console.log('报名数据：', formData);
                }, 1500);
            }
        });

        // 输入时清除错误提示
        nameInput.addEventListener('input', function() {
            nameError.style.display = 'none';
            this.style.borderColor = '#e0e0e0';
        });

        phoneInput.addEventListener('input', function() {
            phoneError.style.display = 'none';
            this.style.borderColor = '#e0e0e0';
        });
    </script>
</body>
</html>
